<!DOCTYPE html>
<!-- saved from url=(0048)file:///C:/Users/violet/Downloads/catalog_4.html -->
<html lang="ar" dir="rtl"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتالوج وحداتي</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #0d0d0d;
    color: #fff;
    min-height: 100vh;
    direction: rtl;
  }

  /* TOP BAR */
  .topbar {
    background: #161616;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #222;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .stats-left { display: flex; gap: 20px; align-items: center; }
  .stat-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #aaa; }
  .stat-dot { width: 9px; height: 9px; border-radius: 50%; }
  .stat-dot.green { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
  .stat-dot.orange { background: #fb923c; box-shadow: 0 0 6px #fb923c88; }
  .stat-num { font-weight: 700; color: #fff; font-size: 14px; }

  .brand { text-align: left; }
  .brand-name { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .brand-sub { font-size: 11px; color: #555; margin-top: 1px; }
  .brand-avatar {
    width: 38px; height: 38px; border-radius: 10px;
    background: #c8a847;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: #0d0d0d;
    margin-left: 12px;
  }
  .brand-right { display: flex; align-items: center; }

  /* SEARCH */
  .search-wrap {
    padding: 16px 24px;
    background: #0d0d0d;
  }
  .search-box {
    background: #1a1a1a;
    border: 1px solid #272727;
    border-radius: 12px;
    padding: 12px 18px 12px 44px;
    width: 100%;
    color: #fff;
    font-size: 14px;
    font-family: 'Cairo', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }
  .search-box::placeholder { color: #444; }
  .search-box:focus { border-color: #333; }
  .search-icon-wrap { position: relative; }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #444;
    font-size: 16px;
    pointer-events: none;
  }

  /* FILTERS */
  .filters {
    padding: 4px 24px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .fbtn {
    padding: 7px 18px;
    border-radius: 22px;
    border: 1px solid #272727;
    background: #1a1a1a;
    color: #888;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    font-weight: 500;
  }
  .fbtn:hover { border-color: #333; color: #ccc; }
  .fbtn.active { background: #c8a847; color: #0d0d0d; border-color: #c8a847; font-weight: 700; }
  .fbtn .fnum {
    background: rgba(255,255,255,0.12);
    color: inherit;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
  }
  .fbtn.active .fnum { background: rgba(0,0,0,0.2); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    padding: 0 24px 100px;
  }

  /* CARD */
  .card {
    background: #161616;
    border-radius: 16px;
    border: 1px solid #222;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover { border-color: #333; transform: translateY(-2px); }

  .card-img {
    height: 170px;
    background: #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    font-size: 48px;
  }
  .card-img.img-sell { background: #141a14; }
  .card-img.img-rent { background: #141420; }

  .img-placeholder {
    opacity: 0.35;
    font-size: 52px;
  }

  .badges {
    position: absolute;
    top: 10px;
    right: 10px;
    left: 10px;
    display: flex;
    justify-content: space-between;
  }
  .badge {
    padding: 4px 11px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
  }
  .badge-sell { background: #dc2626; color: #fff; }
  .badge-rent { background: #2563eb; color: #fff; }
  .badge-city { background: #1f2937; color: #d1d5db; border: 1px solid #374151; }

  .card-body { padding: 14px 16px; }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sd-avail { background: #4ade80; box-shadow: 0 0 5px #4ade8066; }
  .sd-res { background: #fb923c; box-shadow: 0 0 5px #fb923c66; }
  .sd-sold { background: #6b7280; }

  .card-loc {
    font-size: 12px;
    color: #555;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-specs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .spec {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: #888;
  }
  .spec-icon { font-size: 13px; }
  .spec b { color: #ccc; font-weight: 600; }

  .card-note {
    font-size: 12px;
    color: #555;
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .card-price {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-wrap: wrap;
  }
  .price-sell { color: #4ade80; }
  .price-rent { color: #60a5fa; }
  .price-unit { font-size: 13px; font-weight: 500; color: #888; }
  .price-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 600;
    margin-right: 4px;
  }
  .ps-avail { background: #14532d; color: #86efac; }
  .ps-res { background: #431407; color: #fdba74; }
  .ps-sold { background: #1f2937; color: #9ca3af; }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-x {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid #272727;
    background: #1a1a1a;
    color: #ef4444;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-x:hover { background: #2a1a1a; }
  .counter-num {
    width: 28px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  .btn-wa {
    flex: 1;
    background: #22c55e;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn-wa:hover { background: #16a34a; }

  /* STATUS TOGGLE */
  .btn-status {
    padding: 6px 10px;
    border-radius: 7px;
    border: 1px solid #272727;
    background: #1a1a1a;
    color: #888;
    font-size: 11px;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .btn-status:hover { border-color: #444; color: #ccc; }

  /* ADD BUTTON */
  .fab {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: #c8a847;
    color: #0d0d0d;
    border: none;
    border-radius: 14px;
    padding: 13px 20px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 24px rgba(200,168,71,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 200;
  }
  .fab:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(200,168,71,0.45); }

  .empty {
    text-align: center;
    color: #333;
    padding: 80px 20px;
    font-size: 15px;
    grid-column: 1/-1;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 18px;
    padding: 24px;
    width: 90%;
    max-width: 480px;
    direction: rtl;
  }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 18px; color: #fff; }
  .modal label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    background: #111;
    border: 1px solid #272727;
    border-radius: 8px;
    padding: 9px 12px;
    color: #fff;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    outline: none;
    direction: rtl;
  }
  .modal textarea { height: 70px; resize: none; }
  .modal select option { background: #1a1a1a; }
  .modal-btns { display: flex; gap: 8px; margin-top: 18px; }
  .modal-btn-save {
    flex: 1; background: #22c55e; color: #fff; border: none;
    border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 700;
    font-family: 'Cairo', sans-serif; cursor: pointer;
  }
  .modal-btn-cancel {
    flex: 1; background: #1a1a1a; color: #888; border: 1px solid #272727;
    border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 600;
    font-family: 'Cairo', sans-serif; cursor: pointer;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="stats-left" id="topstats">
    <div class="stat-item"><span class="stat-dot green"></span><span class="stat-num">0</span> متاحة</div>
    <div class="stat-item"><span class="stat-dot orange"></span><span class="stat-num">0</span> محجوزة</div>
    <div class="stat-item" style="color:#555">إجمالي <span class="stat-num" style="color:#777">0</span></div>
  </div>
  <div class="brand-right">
    <div class="brand">
      <div class="brand-name">كتالوج وحداتي</div>
      <div class="brand-sub">مشاريع مدينتي ومدينة نور</div>
    </div>
    <div class="brand-avatar">ب</div>
  </div>
</div>

<div class="search-wrap">
  <div class="search-icon-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-box" type="text" id="search" placeholder="ابحث بالاسم أو الموقع أو السعر..." oninput="render()">
  </div>
</div>

<div class="filters" id="filters">
    <button class="fbtn active" onclick="setFilter(&#39;all&#39;)">
      الكل <span class="fnum">0</span>
    </button>
    <button class="fbtn " onclick="setFilter(&#39;sell&#39;)">
      بيع <span class="fnum">0</span>
    </button>
    <button class="fbtn " onclick="setFilter(&#39;rent&#39;)">
      إيجار <span class="fnum">0</span>
    </button>
    <button class="fbtn " onclick="setFilter(&#39;مدينتي&#39;)">
      مدينتي <span class="fnum">0</span>
    </button>
    <button class="fbtn " onclick="setFilter(&#39;نور&#39;)">
      مدينة نور <span class="fnum">0</span>
    </button>
    <button class="fbtn " onclick="setFilter(&#39;avail&#39;)">
      متاحة <span class="fnum">0</span>
    </button></div>
<div class="grid" id="grid"><div class="empty">مفيش نتايج للبحث ده 🔍</div></div>

<button class="fab" onclick="openModal()">+ أضف وحدة جديدة</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>إضافة وحدة جديدة</h3>
    <label>اسم الوحدة</label>
    <input type="text" id="f-title" placeholder="مثال: شقة A5 - الدور الثالث">
    <label>المدينة</label>
    <select id="f-city">
      <option value="مدينتي">مدينتي</option>
      <option value="نور">مدينة نور</option>
    </select>
    <label>النوع</label>
    <select id="f-type">
      <option value="sell">للبيع</option>
      <option value="rent">للإيجار</option>
    </select>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div><label>غرف</label><input type="number" id="f-rooms" value="3" min="1" max="10"></div>
      <div><label>حمامات</label><input type="number" id="f-baths" value="2" min="1" max="5"></div>
      <div><label>مساحة م²</label><input type="number" id="f-size" value="120" min="30"></div>
    </div>
    <label>السعر (أرقام فقط)</label>
    <input type="number" id="f-price" placeholder="مثال: 3500000">
    <label>ملاحظة</label>
    <textarea id="f-note" placeholder="تشطيب، إطلالة، مميزات..."></textarea>
    <div class="modal-btns">
      <button class="modal-btn-save" onclick="saveUnit()">حفظ الوحدة</button>
      <button class="modal-btn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
let listings = [];

let nextId = 11;
let activeFilter = 'all';
let counters = {};

const ST = {
  avail: { lbl: 'متاحة', dc: 'sd-avail', ps: 'ps-avail', dot: 'green' },
  res:   { lbl: 'محجوزة', dc: 'sd-res',   ps: 'ps-res',   dot: 'orange' },
  sold:  { lbl: 'مباعة',  dc: 'sd-sold',  ps: 'ps-sold',  dot: 'sold' }
};

function fmt(price, type) {
  if (type === 'rent') return price.toLocaleString('ar-EG');
  if (price >= 1000000) {
    const m = price / 1000000;
    return (Number.isInteger(m) ? m : m.toFixed(1)) + ' مليون';
  }
  return price.toLocaleString('ar-EG');
}

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  return listings.filter(l => {
    const mf = activeFilter === 'all' || activeFilter === l.type || activeFilter === l.city || activeFilter === l.status;
    if (!q) return mf;
    return mf && (l.title.includes(q) || l.city.includes(q) || l.note.includes(q) || String(l.price).includes(q));
  });
}

function cycleStatus(id) {
  const l = listings.find(x => x.id === id);
  if (!l) return;
  const order = ['avail', 'res', 'sold'];
  l.status = order[(order.indexOf(l.status) + 1) % order.length];
  render();
}

function deleteUnit(id) {
  listings = listings.filter(x => x.id !== id);
  render();
}

function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveUnit() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('اكتب اسم الوحدة'); return; }
  const price = parseInt(document.getElementById('f-price').value) || 0;
  listings.unshift({
    id: nextId++,
    title,
    city: document.getElementById('f-city').value,
    type: document.getElementById('f-type').value,
    rooms: parseInt(document.getElementById('f-rooms').value) || 3,
    baths: parseInt(document.getElementById('f-baths').value) || 2,
    size: parseInt(document.getElementById('f-size').value) || 120,
    note: document.getElementById('f-note').value.trim() || '—',
    price,
    status: 'avail'
  });
  closeModal();
  render();
}

function render() {
  const avail = listings.filter(l => l.status === 'avail').length;
  const res   = listings.filter(l => l.status === 'res').length;
  const total = listings.length;

  document.getElementById('topstats').innerHTML = `
    <div class="stat-item"><span class="stat-dot green"></span><span class="stat-num">${avail}</span> متاحة</div>
    <div class="stat-item"><span class="stat-dot orange"></span><span class="stat-num">${res}</span> محجوزة</div>
    <div class="stat-item" style="color:#555">إجمالي <span class="stat-num" style="color:#777">${total}</span></div>
  `;

  const fdef = [
    { k: 'all',      l: 'الكل',       n: total },
    { k: 'sell',     l: 'بيع',        n: listings.filter(x => x.type === 'sell').length },
    { k: 'rent',     l: 'إيجار',      n: listings.filter(x => x.type === 'rent').length },
    { k: 'مدينتي',  l: 'مدينتي',     n: listings.filter(x => x.city === 'مدينتي').length },
    { k: 'نور',      l: 'مدينة نور',  n: listings.filter(x => x.city === 'نور').length },
    { k: 'avail',    l: 'متاحة',      n: avail },
  ];
  document.getElementById('filters').innerHTML = fdef.map(f => `
    <button class="fbtn ${activeFilter === f.k ? 'active' : ''}" onclick="setFilter('${f.k}')">
      ${f.l} <span class="fnum">${f.n}</span>
    </button>`).join('');

  const items = getFiltered();
  const icons = { sell: '🏠', rent: '🛋️' };
  document.getElementById('grid').innerHTML = items.length ? items.map(l => {
    const s = ST[l.status];
    const cnt = counters[l.id] || 1;
    const priceStr = fmt(l.price, l.type);
    const unit = l.type === 'rent' ? 'جنيه/شهر' : 'جنيه';
    const pcls = l.type === 'sell' ? 'price-sell' : 'price-rent';
    return `
    <div class="card">
      <div class="card-img img-${l.type}">
        <span class="img-placeholder">${icons[l.type]}</span>
        <div class="badges">
          <div class="badge badge-${l.type}">${l.type === 'sell' ? 'بيع' : 'إيجار'}</div>
          <div class="badge badge-city">${l.city === 'نور' ? 'مدينة نور' : 'مدينتي'}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">
          <span class="status-dot ${s.dc}"></span>
          ${l.title}
        </div>
        <div class="card-loc">📍 ${l.city === 'نور' ? 'مدينة نور' : 'مدينتي'} - مشاريع طلعت مصطفى</div>
        <div class="card-specs">
          <div class="spec"><span class="spec-icon">🏠</span> <b>${l.size}</b> م²</div>
          <div class="spec"><span class="spec-icon">🛏</span> <b>${l.rooms}</b> غرف</div>
          <div class="spec"><span class="spec-icon">🚿</span> <b>${l.baths}</b> حمام</div>
        </div>
        <div class="card-note">${l.note}</div>
        <div class="card-price">
          <span class="${pcls}">${priceStr}</span>
          <span class="price-unit">${unit}</span>
          <span class="price-status ${s.ps}">${s.lbl}</span>
        </div>
        <div class="card-actions">
          <button class="btn-x" onclick="deleteUnit(${l.id})">✕</button>
          <span class="counter-num" id="cnt-${l.id}">${cnt}</span>
          <button class="btn-wa" onclick="waClick('${l.title}','${l.city}','${priceStr} ${unit}')">واتساب</button>
          <button class="btn-status" onclick="cycleStatus(${l.id})">${s.lbl}</button>
        </div>
      </div>
    </div>`;
  }).join('') : '<div class="empty">مفيش نتايج للبحث ده 🔍</div>';
}

function waClick(title, city, price) {
  const msg = encodeURIComponent(`مرحباً، أنا مهتم بـ ${title} في ${city === 'نور' ? 'مدينة نور' : 'مدينتي'} بسعر ${price}`);
  window.open(`https://wa.me/201069643574?text=${msg}`, '_blank');
}

function setFilter(k) { activeFilter = k; render(); }

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

render();
</script>


</body></html>
